name: AGI-OS Unified Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Checkout cogpy-hpp
      uses: actions/checkout@v4
      with:
        repository: cogpy/cogpy-hpp
        path: cogpy-hpp
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout cog0
      uses: actions/checkout@v4
      with:
        repository: ReZorg/cog0
        path: cog0
        token: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc g++ cmake

    - name: Build NT Compatibility Test (C11)
      run: |
        gcc -std=c11 -Wall -Wextra \
          -Wno-unused-parameter -Wno-unused-variable -Wno-missing-field-initializers \
          -Wno-multichar \
          -I include/nt_compat \
          -o tests/test_nt_compat_bin \
          tests/test_nt_compat.c src/nt_compat/nt_stubs.c

    - name: Run NT Compatibility Tests
      run: ./tests/test_nt_compat_bin

    - name: Build Unified Test Suite (C++17)
      run: |
        g++ -std=c++17 -Wall -Wextra \
          -Wno-unused-parameter -Wno-unused-variable -Wno-missing-field-initializers \
          -Wno-multichar \
          -I include/nt_compat \
          -I include/cogpy \
          -I cogpy-hpp/include \
          -o tests/test_main_bin \
          tests/test_main.cpp \
          src/nt_compat/nt_stubs.c

    - name: Run Unified Test Suite
      run: ./tests/test_main_bin

    - name: Build CLI
      run: |
        g++ -std=c++17 -O2 \
          -Wno-unused-parameter -Wno-unused-variable -Wno-missing-field-initializers \
          -Wno-multichar \
          -I include/nt_compat \
          -I include/cogpy \
          -I cogpy-hpp/include \
          -o winkognn_cli \
          src/cli/main.cpp \
          src/nt_compat/nt_stubs.c

    - name: Smoke Test CLI
      run: |
        echo 'status' | ./winkognn_cli
